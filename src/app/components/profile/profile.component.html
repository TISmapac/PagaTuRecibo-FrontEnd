<div class="main-card profile-card">

  <div class="profile-header">
    <h2 class="profile-title">Perfil</h2>

    <div class="profile-actions">
      <button id="btnCancel" *ngIf="editing" (click)="cancel()" class="btn btn-outline-dark">
        Cancelar
      </button>

      <button id="btnSave" *ngIf="editing" [disabled]="isSaveDisabled" (click)="updateUser()" class="btn btn-success">
        Guardar <i class="far fa-save"></i>
      </button>

      <button id="btnEdit" *ngIf="!editing" (click)="editUser()" class="btn btn-outline-primary">
        Editar <i class="far fa-edit"></i>
      </button>
    </div>
  </div>

  <hr>

  <form [formGroup]="userForm">
    <input formControlName="id" type="hidden">
    <input formControlName="email" type="hidden">

    <div class="profile-field">
      <span class="profile-label">Correo:</span>
      <span class="profile-value">{{ user?.email }}</span>
    </div>

    <div class="profile-field">
      <span class="profile-label">Nombre:</span>
      <span class="profile-value" *ngIf="!editing">{{ updateNombreService.nombreUsuario }}</span>
      <input *ngIf="editing" formControlName="nombre" id="inputNombre" type="text" class="form-control profile-input">
    </div>
  </form>

</div>

<div *ngIf="isLoadingName$ | async" class="spinner"
    style="display: flex; justify-content: center; align-items: center;">

    <div class="lds-hourglass"></div>

</div>
