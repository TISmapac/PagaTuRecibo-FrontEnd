<div class="auth-page">
  <div class="auth-card">

    <!-- Panel de bienvenida -->
    <div class="auth-welcome">
      <div class="welcome-content">
        <h2>Bienvenido al portal de pago en línea</h2>
        <p class="welcome-text">¡Rápido, fácil y seguro!</p>
        <br>
        <div class="auth-logo"></div>
      </div>
    </div>

    <!-- Formulario -->
    <div class="auth-form">
      <form (submit)="onRegisterUser()" id="form-register">
        <h3>Registrarse</h3>

        <div class="form-group">
          <span class="titleInput">Nombre</span>
          <input class="form-control form-control-lg" type="text"
            [(ngModel)]="user.nombre" name="nombre" id="nombre" />
        </div>

        <div class="form-group">
          <span class="titleInput">Correo electrónico</span>
          <input class="form-control form-control-lg" type="email"
            [(ngModel)]="user.email" name="email" id="email" />
        </div>

        <div class="form-group">
          <span class="titleInput">Contraseña</span>
          <input type="password" class="form-control form-control-lg"
            [(ngModel)]="user.password" name="password" id="password" />
        </div>

        <div class="form-group">
          <span class="titleInput">Confirmar contraseña</span>
          <input type="password" class="form-control form-control-lg"
            [(ngModel)]="passwordConfirm" name="passAux" id="passAux" />
        </div>

        <button id="btnRegister" type="submit" [disabled]="isSubmitting"
          class="btn btn-primary form-control mb-2" style="font-weight: 600">
          <span *ngIf="isLoading$ | async" class="spinner-border spinner-border-sm"
            role="status" aria-hidden="true"></span>
          Registrarse
        </button>

        <div class="error" id="errorMessage" *ngIf="errorMessage">{{ errorMessage }}</div>

        <div class="register">
          ¿Tienes cuenta? <a href="#" [routerLink]="['/']">Inicia sesión</a>
        </div>
      </form>
    </div>

  </div>
</div>
